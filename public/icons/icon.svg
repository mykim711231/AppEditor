<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#sheen)"/>

  <!-- 에디터 창 -->
  <rect x="86" y="118" width="340" height="288" rx="34" fill="#0f172a"/>
  <rect x="86" y="118" width="340" height="288" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- 타이틀바 신호등 -->
  <circle cx="128" cy="156" r="9" fill="#ef4444"/>
  <circle cx="158" cy="156" r="9" fill="#f59e0b"/>
  <circle cx="188" cy="156" r="9" fill="#22c55e"/>

  <!-- 코드 라인 -->
  <g>
    <rect x="120" y="200" width="176" height="15" rx="7.5" fill="#38bdf8"/>
    <rect x="120" y="234" width="112" height="15" rx="7.5" fill="#c4b5fd"/>
    <rect x="150" y="268" width="158" height="15" rx="7.5" fill="#34d399"/>
    <rect x="150" y="302" width="98" height="15" rx="7.5" fill="#f472b6"/>
    <rect x="120" y="336" width="140" height="15" rx="7.5" fill="#38bdf8"/>
    <rect x="120" y="370" width="84" height="15" rx="7.5" fill="#fbbf24"/>
  </g>

  <!-- 커서 캐럿 -->
  <rect x="320" y="264" width="16" height="23" rx="3" fill="#ffffff" fill-opacity="0.95"/>
</svg>
