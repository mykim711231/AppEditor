<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 코드 브래킷 < > -->
  <g fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="188,176 116,256 188,336"/>
    <polyline points="324,176 396,256 324,336"/>
  </g>

  <!-- 슬래시 / -->
  <line x1="288" y1="150" x2="224" y2="362" stroke="#f8fafc" stroke-width="26" stroke-linecap="round"/>
</svg>
